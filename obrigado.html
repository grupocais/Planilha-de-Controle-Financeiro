<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obrigado | CAIS Investimentos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Download automático da planilha ao entrar na página -->
  
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var link = document.createElement('a');
        link.href = 'https://github.com/grupocais/Planilha-de-Controle-Financeiro/raw/main/planilha.xlsx';
        link.download = 'Cais_Investimentos_Planilha-de-Controle-Financeiro';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }, 800);
    });\
    
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#03101d;
--card:#082844;
--gold:#d9bd7e;
--white:#ffffff;
--text:#b8c6d3;
}

body{
background:var(--bg);
font-family:'Outfit',sans-serif;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:30px;
}

.box{
width:100%;
max-width:720px;
background:var(--card);
border-radius:32px;
padding:60px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
}

.logo{
height:58px;
margin-bottom:50px;
}

.check{
width:90px;
height:90px;
border-radius:50%;
border:1px solid rgba(217,189,126,0.5);
display:flex;
align-items:center;
justify-content:center;
margin:auto auto 35px;
font-size:42px;
color:var(--gold);
}

h1{
font-size:58px;
line-height:1;
margin-bottom:20px;
font-weight:600;
letter-spacing:-2px;
}

h1 span{
display:block;
font-style:italic;
font-weight:300;
color:var(--gold);
margin-top:10px;
}

p{
font-size:20px;
line-height:1.8;
color:var(--text);
margin-bottom:40px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:18px 34px;
background:var(--gold);
color:#03101d;
text-decoration:none;
font-weight:600;
border-radius:18px;
transition:0.25s;
font-size:15px;
width:100%;
max-width:400px;
}

.btn:hover{
transform:translateY(-2px);
opacity:0.9;
}

.note{
margin-top:26px;
font-size:14px;
color:#8da0b2;
}

@media(max-width:700px){

.box{
padding:40px 26px;
}

h1{
font-size:40px;
}

p{
font-size:17px;
}

}

</style>

</head>

<body>

<div class="box">

<img src="logo-endossada-cais-necton.png" class="logo">

<div class="check">
✓
</div>

<h1>
Obrigado pela confiança
<span>download liberado</span>
</h1>

<p>
Sua planilha está sendo baixada automaticamente.
Caso o download não comece, utilize o botão abaixo.
</p>

<a
class="btn"
href="https://github.com/grupocais/Planilha-de-Controle-Financeiro/raw/main/planilha.xlsx"
>
BAIXAR PLANILHA AGORA
</a>

<div class="note">
Nossa equipe pode entrar em contato com você para ajudar na organização financeira e investimentos.
</div>

</div>

</body>
</html>
